
services:
  nginx:
    image: nginx:alpine
    container_name: pangea-carbon_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
  minio_data:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - pangea-carbon_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pangea-carbon_frontend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    networks:
      - pangea-carbon_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pangea-carbon_backend
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
    image: minio/minio:latest
    container_name: pangea-carbon_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-pangea}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-pangea_minio_2026!}
    volumes:
  minio_data:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pangea-network

  redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pangea-carbon_net

  postgres:
    image: postgres:16-alpine
    container_name: pangea-carbon_postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
  minio_data:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pangea-carbon_net

  minio:
    image: minio/minio:latest
    container_name: pangea-carbon_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-pangea}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-pangea_minio_2026!}
    volumes:
  minio_data:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pangea-network

  redis:
    image: redis:7-alpine
    container_name: pangea-carbon_redis
    volumes:
  minio_data:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pangea-carbon_net

  certbot:
    image: certbot/certbot
    container_name: pangea-carbon_certbot
    volumes:
  minio_data:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  minio_data:
  postgres_data:
  redis_data:
  certbot_webroot:
  certbot_certs:

networks:
  pangea-carbon_net:
    driver: bridge
