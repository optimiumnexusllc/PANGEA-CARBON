worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        listen [::]:80;
        server_name pangea-carbon.com www.pangea-carbon.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        resolver 127.0.0.11 valid=10s ipv6=off;
        listen [::]:443 ssl;
        server_name pangea-carbon.com www.pangea-carbon.com;

        ssl_certificate     /etc/letsencrypt/live/pangea-carbon.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pangea-carbon.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Strict-Transport-Security "max-age=31536000" always;

        # Frontend
        location / {
            set $upstream_frontend http://frontend:3000;
            proxy_pass         $upstream_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Webhooks gateways — pas de rate limit (vient des serveurs Flutterwave/CinetPay)
        location /api/marketplace/webhook/ {
            set $upstream_backend http://backend:4000;
            proxy_pass         $upstream_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # API Backend
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            set $upstream_backend http://backend:4000;
            proxy_pass         $upstream_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            set $upstream_backend http://backend:4000;
            proxy_pass         $upstream_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}
